server:
  port: 8096
  shutdown: graceful

spring:
  application:
    name: seller-service

  datasource:
    url: jdbc:postgresql://localhost:5432/seller_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: SellerServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ecommerce

# Settlement schedule — runs every Sunday at 2am
seller:
  settlement:
    cron: "0 0 2 * * SUN"
    # Platform commission rates by category (percentage)
    commission-rates:
      electronics: 5.0
      clothing: 12.0
      books: 8.0
      home: 10.0
      default: 10.0
    # Minimum payout amount in paise (₹500)
    minimum-payout-paise: 50000
    # Settlement hold period in days after delivery
    hold-period-days: 7

  kyc:
    # Documents required for seller approval
    required-docs:
      - PAN_CARD
      - GST_CERTIFICATE
      - BANK_STATEMENT
      - CANCELLED_CHEQUE

resilience4j:
  circuitbreaker:
    instances:
      notificationService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
  retry:
    instances:
      notificationService:
        max-attempts: 3
        wait-duration: 500ms

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.ecommerce.seller: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId},%X{spanId}] %-5level %logger{36} - %msg%n"
