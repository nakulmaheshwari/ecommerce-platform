<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; }
        .header { background: #16213e; color: white; padding: 40px; text-align: center; }
        .body { padding: 30px; }
        .btn { background: #16213e; color: white; padding: 14px 28px; border-radius: 6px;
               text-decoration: none; display: inline-block; margin: 20px 0; font-size: 16px; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Welcome to EcomPlatform!</h1>
        <p>Your account has been created</p>
    </div>
    <div class="body">
        <p>Hi <strong th:text="${firstName}">there</strong>,</p>
        <p>Welcome! Your account is ready. Start shopping from millions of products.</p>
        <a href="#" class="btn">Start Shopping</a>
        <p style="color: #666; font-size: 14px;">
            If you didn't create this account, please ignore this email.
        </p>
    </div>
    <div class="footer">
        <p>EcomPlatform | This is an automated message.</p>
    </div>
</div>
</body>
</html>
