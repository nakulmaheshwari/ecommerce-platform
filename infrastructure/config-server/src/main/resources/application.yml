server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    # Use native file system for local dev. Production would use 'git'.
    active: native
  cloud:
    config:
      server:
        native:
          # Search for configs in the local config-repo folder
          search-locations: file://${user.dir}/infrastructure/config-repo/

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
