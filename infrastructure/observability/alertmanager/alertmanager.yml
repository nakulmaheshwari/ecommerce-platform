global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'job', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 0s
      repeat_interval: 30m

    - match:
        service: payment-service
      receiver: 'payment-team'
      group_wait: 0s

receivers:
  - name: 'default'
    # In production: add Slack webhook or email config here

  - name: 'critical'
    # webhook_configs:
    #   - url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     send_resolved: true

  - name: 'payment-team'
    # pagerduty_configs:
    #   - routing_key: 'YOUR_PAGERDUTY_KEY'

inhibit_rules:
  # If a service is DOWN, suppress all other alerts for that service
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['job']
