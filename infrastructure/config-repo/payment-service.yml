server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: ecom_admin
    password: ecom_secret_123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: PaymentHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: payment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ecommerce

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:secret_placeholder}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:webhook_secret_placeholder}

logging:
  level:
    com.ecommerce.payment: DEBUG
    org.springframework.kafka: INFO
    com.razorpay: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
