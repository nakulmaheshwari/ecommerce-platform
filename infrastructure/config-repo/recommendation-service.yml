server:
  port: 8095
  shutdown: graceful

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/recommendation_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: RecServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      cluster:
        nodes:
          - redis-0:6379
          - redis-1:6379
          - redis-2:6379
        max-redirects: 3
      timeout: 2000ms
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 30s

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ecommerce

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30s

recommendation:
  cache:
    ttl:
      user-personal: 21600
      product-similar: 86400
      product-fbt: 86400
      product-also-bought: 86400
      trending-global: 300
      trending-category: 900
      recently-viewed: 2592000
      session-context: 1800
      user-affinity: 604800
  limits:
    recently-viewed-max: 20
    recommendations-max: 50
    trending-max: 100

resilience4j:
  circuitbreaker:
    instances:
      catalogService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  timelimiter:
    instances:
      catalogService:
        timeout-duration: 2s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.ecommerce.recommendation: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId},%X{spanId}] %-5level %logger{36} - %msg%n"
