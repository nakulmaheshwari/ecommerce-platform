version: "3.9"

networks:
  ecommerce-net:
    driver: bridge

volumes:
  postgres_identity_data:
  postgres_order_data:
  postgres_inventory_data:
  postgres_payment_data:
  redis_data:
  keycloak_data:
  elasticsearch_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

services:

  # ─────────────────────────────────────────
  # PostgreSQL — one DB server, multiple DBs
  # In production you'd have separate clusters
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecom_admin
      POSTGRES_PASSWORD: ecom_secret_123
      POSTGRES_MULTIPLE_DATABASES: identity_db,order_db,inventory_db,payment_db,user_db,product_db,shipping_db,notification_db,review_db
    volumes:
      - postgres_identity_data:/var/lib/postgresql/data
      - ./init-scripts/create-multiple-dbs.sh:/docker-entrypoint-initdb.d/create-multiple-dbs.sh
    ports:
      - "5432:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — cart, cache, rate limiting
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ecom-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret_123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_123", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────
  # Zookeeper — required by Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecom-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Kafka — event bus for all services
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecom-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # Kafka UI — browse topics and messages
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecom-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "9080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Keycloak — Identity Provider (IdP)
  # admin console: http://localhost:8180
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: ecom-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/identity_db
      KC_DB_USERNAME: ecom_admin
      KC_DB_PASSWORD: ecom_secret_123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Zipkin — distributed tracing UI
  # http://localhost:9411
  # ─────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.2
    container_name: ecom-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Mailhog — local email testing
  # UI: http://localhost:8025
  # ─────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ecom-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Kafka Exporter — consumer lag as Prometheus metrics
  # ─────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: ecom-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:29092
      - --web.listen-address=:9308
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Prometheus — scrapes /actuator/prometheus from all services
  # UI: http://localhost:9090
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: ecom-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Alertmanager — routes alerts (Slack/email/PagerDuty)
  # UI: http://localhost:9093
  # ─────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ecom-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Grafana — dashboards for the four golden signals
  # UI: http://localhost:3000  (admin / admin123)
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: ecom-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboard-files/platform-overview.json
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Loki — log aggregation backend for Grafana
  # ─────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: ecom-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────
  # Promtail — ships container logs to Loki
  # ─────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: ecom-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log
      - ./observability/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - ecommerce-net

  # ─────────────────────────────────────────────
  # Elasticsearch — search engine
  # UI via Kibana: http://localhost:5601
  # Direct API: http://localhost:9200
  # ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: ecom-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # Disabled for local dev only
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m     # Tune for local dev
      - cluster.name=ecommerce-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL",
             "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # Kibana — Elasticsearch UI
  # Useful for inspecting index mappings and running queries
  # ─────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.1
    container_name: ecom-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ecommerce-net
